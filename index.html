<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corra Photobooth - Download Session</title>
    <style>
        body { 
            margin: 0; 
            padding: 40px 20px; 
            background: #ffffff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            color: #2d3436; 
        }
        .container { max-width: 600px; margin: 0 auto; }
        
        h1 { 
            font-weight: 300; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            border-bottom: 1px solid #eee; 
            padding-bottom: 20px; 
            margin-bottom: 40px;
            font-size: 24px;
        }

        .gallery-grid {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .item { 
            background: #fff;
            padding: 10px;
            border-radius: 12px;
        }

        img { 
            width: 100%; 
            height: auto;
            border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            margin-bottom: 15px; 
            display: block;
        }

        .btn { 
            display: inline-block; 
            padding: 14px 30px; 
            background: #1a1a1a; 
            color: #ffffff; 
            text-decoration: none; 
            font-size: 12px; 
            font-weight: 600; 
            border-radius: 50px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: transform 0.2s;
        }
        
        .btn:active { transform: scale(0.95); }

        .timer-box { 
            background: #fffafa; 
            border: 1px solid #ffebeb; 
            padding: 20px; 
            border-radius: 15px; 
            margin-top: 60px; 
        }

        .timer-label { 
            font-size: 11px; 
            color: #e74c3c; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            display: block;
            margin-bottom: 5px;
        }

        .footer-text { font-size: 11px; color: #a0aec0; margin-top: 20px; }
        
        /* Loading state */
        #status-msg { color: #a0aec0; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="brand-title">PHOTO SESSION</h1>
        
        <div id="gallery" class="gallery-grid">
            <p id="status-msg">Memuat foto-foto kamu...</p>
        </div>

        <div class="timer-box">
            <span class="timer-label">⚠️ Link Berlaku 30 Menit</span>
            <p style="font-size: 12px; color: #4a5568; margin: 5px 0 0 0;">
                Segera simpan foto ke galeri HP sebelum terhapus otomatis.
            </p>
        </div>

        <p class="footer-text">© 2026 Corra Studio. All rights reserved.</p>
    </div>

    <script>
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const gallery = document.getElementById('gallery');
            const statusMsg = document.getElementById('status-msg');
            
            // Ambil data dari URL
            const brand = params.get('brand');
            const frame = params.get('frame');
            const gif = params.get('gif');
            const raws = params.get('raws') ? params.get('raws').split(',') : [];

            // Update Judul Brand
            if (brand) {
                document.getElementById('brand-title').innerText = decodeURIComponent(brand).toUpperCase();
            }

            // Fungsi membuat elemen gambar & tombol
            const renderItem = (url, label) => {
                if (!url || url === "" || url === "null") return false;
                
                const div = document.createElement('div');
                div.className = 'item';
                
                // PERUBAHAN ADA DI SINI: Jika gambar gagal load, ganti dengan tulisan, tombol download tetap ada
                div.innerHTML = `
                    <img src="${url}" alt="${label}" onerror="this.src='https://via.placeholder.com/500x350/f8f9fa/a0aec0?text=Preview+Gambar+Lambat'; this.onerror=null;">
                    <a href="${url}" target="_blank" download class="btn">Download ${label}</a>
                `;
                
                gallery.appendChild(div);
                return true;
            };

            // Bersihkan pesan loading
            let hasContent = false;

            // 1. Tampilkan GIF (Paling Atas)
            if(renderItem(gif, 'GIF Animation')) hasContent = true;

            // 2. Tampilkan Frame
            if(renderItem(frame, 'Framed Photo')) hasContent = true;

            // 3. Tampilkan Semua Foto Satuan
            raws.forEach((url, index) => {
                if(renderItem(url, `Photo #${index + 1}`)) hasContent = true;
            });

            // Jika tidak ada data sama sekali
            if (!hasContent) {
                statusMsg.innerHTML = "<span style='color: #e74c3c;'>Foto tidak ditemukan atau sudah kedaluwarsa.</span>";
            } else {
                statusMsg.style.display = 'none';
            }
        };
    </script>
</body>
</html>
