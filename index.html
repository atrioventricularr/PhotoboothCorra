<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corra Photobooth - Download Session</title>
    <style>
        body { 
            margin: 0; 
            padding: 40px 20px; 
            background: #ffffff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            color: #2d3436; 
        }
        .container { max-width: 600px; margin: 0 auto; }
        
        h1 { 
            font-weight: 300; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            border-bottom: 1px solid #eee; 
            padding-bottom: 20px; 
            margin-bottom: 40px;
            font-size: 24px;
        }

        .gallery-grid {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .item { 
            background: #fff;
            padding: 10px;
            border-radius: 12px;
        }

        img { 
            width: 100%; 
            height: auto;
            border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            margin-bottom: 15px; 
            display: block;
        }

        .btn { 
            display: inline-block; 
            padding: 14px 30px; 
            background: #1a1a1a; 
            color: #ffffff; 
            text-decoration: none; 
            font-size: 12px; 
            font-weight: 600; 
            border-radius: 50px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: transform 0.2s;
        }
        
        .btn:active { transform: scale(0.95); }

        .timer-box { 
            background: #fffafa; 
            border: 1px solid #ffebeb; 
            padding: 20px; 
            border-radius: 15px; 
            margin-top: 60px; 
        }

        .timer-label { 
            font-size: 11px; 
            color: #e74c3c; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            display: block;
            margin-bottom: 5px;
        }

        .footer-text { font-size: 11px; color: #a0aec0; margin-top: 20px; }
        
        /* Loading state */
        #status-msg { color: #a0aec0; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="brand-title">PHOTO SESSION</h1>
        
        <div id="gallery" class="gallery-grid">
            <p id="status-msg">Memuat foto-foto kamu...</p>
        </div>

        <div class="timer-box">
            <span class="timer-label">⚠️ Link Berlaku 30 Menit</span>
            <p style="font-size: 12px; color: #4a5568; margin: 5px 0 0 0;">
                Segera simpan foto ke galeri HP sebelum terhapus otomatis.
            </p>
        </div>

        <p class="footer-text">© 2026 Corra Studio. All rights reserved.</p>
    </div>

    <script>
       window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    const sid = params.get('sid');
    const brand = params.get('brand');
    const rawsCount = parseInt(params.get('raws') || "0");

    if (brand) document.getElementById('brand-title').innerText = decodeURIComponent(brand).toUpperCase();

    // JIKA TIDAK ADA SID (Seperti di screenshot kamu)
    if (!sid) {
        document.getElementById('loading-screen').innerHTML = "<p style='color:#e74c3c;'>Harap scan QR Code dari aplikasi Photobooth untuk melihat foto.</p>";
        return;
    }

    // CARA AMAN MENDAPATKAN BASE URL
    const baseUrl = window.location.origin + window.location.pathname.replace('index.html', '');
    
    // Alamat gambar
    const frameUrl = `${baseUrl}sessions/${sid}/frame.png`;
    const gifUrl = `${baseUrl}sessions/${sid}/gif.gif`;
    const rawUrls = [];
    for(let i=1; i<=rawsCount; i++) {
        rawUrls.push(`${baseUrl}sessions/${sid}/raw-${i}.png`);
    }

    const loadingScreen = document.getElementById('loading-screen');
    const gallery = document.getElementById('gallery');

    function showGallery() {
        gallery.innerHTML = ""; // Bersihkan gallery
        loadingScreen.style.display = 'none';
        gallery.style.display = 'flex';

        renderItem(gifUrl, 'Download GIF Animation');
        renderItem(frameUrl, 'Download Framed Photo');
        rawUrls.forEach((u, index) => {
            renderItem(u, `Download Photo #${index + 1}`);
        });
    }

    function renderItem(url, label) {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
            <img src="${url}" alt="${label}" onerror="this.src='https://via.placeholder.com/500x350?text=Sedang+Memproses...';">
            <a href="${url}" target="_blank" download class="btn">${label}</a>
        `;
        gallery.appendChild(div);
    }

    // FUNGSI CEK KE SERVER
    function checkServer() {
        // Cek apakah file frame.png sudah ada di server GitHub
        fetch(frameUrl, { method: 'HEAD', cache: 'no-store' })
            .then(res => {
                if (res.ok) {
                    showGallery(); // Kalau ada, tampilkan!
                } else {
                    setTimeout(checkServer, 5000); // Kalau belum, cek lagi 5 detik
                }
            })
            .catch(() => setTimeout(checkServer, 5000));
    }

    checkServer();
};
    </script>
</body>
</html>
